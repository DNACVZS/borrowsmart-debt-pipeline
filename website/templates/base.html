<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | BorrowSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bs-nav">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{{ url_for('index') }}">
            {% if logo_filename %}
            <img src="{{ url_for('static', filename=logo_filename) }}" alt="BorrowSmart logo" class="brand-logo">
            {% endif %}
            <span>BorrowSmart</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto gap-lg-2">
                <li class="nav-item"><a class="nav-link {% if active == 'index' %}active{% endif %}" href="{{ url_for('index') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">Advisor Dashboard</a></li>
                <li class="nav-item"><a class="nav-link {% if active == 'insights' %}active{% endif %}" href="{{ url_for('insights') }}">Insights</a></li>
                <li class="nav-item"><a class="nav-link {% if active == 'transparency' %}active{% endif %}" href="{{ url_for('transparency') }}">Transparency</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="py-4">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="border-top py-3">
    <div class="container small text-secondary d-flex flex-wrap justify-content-between gap-2">
        <span>BorrowSmart advisor platform</span>
        <span>No PII. Aggregated data only.</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
{% block scripts %}{% endblock %}
</body>
</html>
